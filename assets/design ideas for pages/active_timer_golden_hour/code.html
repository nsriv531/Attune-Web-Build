<style>
        body {
            background-color: #FFFBF5;
            background-image: radial-gradient(circle at top right, rgba(255, 183, 77, 0.12), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(207, 230, 242, 0.15), transparent 40%);
        }
        .timer-glow {
            box-shadow: 0 0 80px -10px rgba(255, 183, 77, 0.25);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col font-body-md text-on-surface overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#FFFBF5] dark:bg-stone-950 shadow-[0_4px_20px_-2px_rgba(255,183,77,0.1)]">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden border-2 border-primary-container">
<img alt="Profile" data-alt="A professional headshot of a person with a serene expression, set against a soft, sun-drenched backdrop that matches the golden hour aesthetic of the app. The lighting is warm and diffused, creating a calm and focused atmosphere. The style is clean and minimalist, emphasizing natural textures and a high-key light mode palette of ambers and soft whites." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBFrcbR8SuFQN7BXH64-HbYG31O7_S3_HY2fwMWw5rFM02pyDAKIjEzUxmC2OwIW5ThhEOgFhmZ2j7HIhKOHqsDA8OwmLS5kc2Cl2BBPmz3s6uNfV2TCdG2VYNBUa95iCzuRo5jKmcT6hJ9vNbHDwIkjjsp7oZ90ayo2hlAyFg7FOd2ED-BWiUNHg7wVn3Ti02yraOi2rl5aM3BIGFShyEnk7HfnBAY9JpraZMtEWLCSgqMD951ZR7n6_2HPw2yy0TvvDseK8oRHw"/>
</div>
<span class="font-['Plus_Jakarta_Sans'] font-semibold tracking-tight text-2xl font-extrabold text-stone-800 dark:text-stone-100 tracking-tighter">Attune</span>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#FFB74D] text-2xl" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Canvas: Focus Session Timer -->
<main class="flex-grow flex flex-col items-center justify-center px-margin pt-xl pb-xl space-y-lg">
<!-- Timer Section -->
<div class="relative flex flex-col items-center justify-center">
<!-- Progress Ring -->
<div class="relative flex items-center justify-center w-[320px] h-[320px] md:w-[400px] md:h-[400px] rounded-full bg-white/40 backdrop-blur-sm timer-glow border-8 border-surface-container-lowest">
<!-- SVG Circle Component -->
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="text-primary-container/20" cx="50%" cy="50%" fill="transparent" r="46%" stroke="currentColor" stroke-width="12"></circle>
<circle class="text-primary-container" cx="50%" cy="50%" fill="transparent" r="46%" stroke="currentColor" stroke-dasharray="1000" stroke-dashoffset="300" stroke-linecap="round" stroke-width="12"></circle>
</svg>
<!-- Timer Labels -->
<div class="z-10 flex flex-col items-center text-center">
<span class="text-on-surface-variant font-label-md text-label-md tracking-widest opacity-60 uppercase mb-xs">Deep Work</span>
<h1 class="text-[84px] md:text-[104px] font-bold tracking-tighter leading-none text-on-surface">19:32</h1>
<p class="font-body-md text-body-md text-on-surface-variant/70 mt-xs">~20 minutes remaining</p>
</div>
</div>
<!-- Focus Status Chip -->
<div class="mt-md flex items-center gap-2 bg-primary-fixed/30 px-4 py-2 rounded-full border border-primary-container/20">
<span class="w-2 h-2 rounded-full bg-primary-container animate-pulse"></span>
<span class="font-label-md text-label-md text-on-primary-fixed-variant">Session Active</span>
</div>
</div>
<!-- Controls Section -->
<div class="w-full max-w-sm flex flex-col gap-md">
<!-- Primary Action -->
<button class="group w-full h-16 flex items-center justify-center gap-3 bg-primary-container text-on-primary-container rounded-full font-headline-md text-headline-md shadow-[0_8px_30px_rgb(255,183,77,0.3)] hover:shadow-[0_12px_40px_rgb(255,183,77,0.4)] transition-all duration-300 active:scale-95">
<span class="material-symbols-outlined text-3xl" data-icon="pause" style="font-variation-settings: 'FILL' 1;">pause</span>
                Pause
            </button>
<!-- Secondary Actions -->
<div class="grid grid-cols-2 gap-gutter">
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-3xl bg-surface-container-lowest border border-outline-variant/30 hover:bg-white transition-colors group active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="fullscreen_exit">fullscreen_exit</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Minimal View</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-3xl bg-surface-container-lowest border border-outline-variant/30 hover:bg-error-container/20 transition-colors group active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-error transition-colors" data-icon="stop_circle">stop_circle</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">End Early</span>
</button>
</div>
</div>
<!-- Ambient Card (Focus Context) -->
<div class="w-full max-w-md p-md rounded-[32px] bg-white/60 backdrop-blur-md border border-white/40 shadow-sm flex items-center gap-md">
<div class="w-12 h-12 rounded-2xl bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-fixed-variant" data-icon="auto_awesome">auto_awesome</span>
</div>
<div class="flex-grow">
<h3 class="font-label-md text-label-md text-on-surface">Writing Session</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant/70">"Drafting Chapter 3: The Architecture of Flow"</p>
</div>
<button class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-stone-100 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="edit">edit</span>
</button>
</div>
</main>
<!-- BottomNavBar (Hidden on desktop if needed, but per instruction we render for top-level flow) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-stone-900/80 backdrop-blur-md rounded-t-[32px] shadow-[0_-10px_40px_-10px_rgba(69,90,100,0.08)]">
<a class="flex flex-col items-center justify-center text-[#455A64]/60 dark:text-stone-400 px-4 py-2 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors active:translate-y-0.5 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#FFB74D]/10 text-[#FFB74D] rounded-2xl px-4 py-2 active:translate-y-0.5 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="timer" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium">Sessions</span>
</a>
<a class="flex flex-col items-center justify-center text-[#455A64]/60 dark:text-stone-400 px-4 py-2 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors active:translate-y-0.5 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="bar_chart">bar_chart</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium">Progress</span>
</a>
<a class="flex flex-col items-center justify-center text-[#455A64]/60 dark:text-stone-400 px-4 py-2 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors active:translate-y-0.5 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="library_books">library_books</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium">Resources</span>
</a>
<a class="flex flex-col items-center justify-center text-[#455A64]/60 dark:text-stone-400 px-4 py-2 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors active:translate-y-0.5 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium">Settings</span>
</a>
</nav>
<!-- Background Decoration for Golden Hour vibe -->
<div class="fixed top-20 right-[-100px] w-[300px] h-[300px] bg-[#FFB74D] opacity-10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-20 left-[-100px] w-[400px] h-[400px] bg-[#CFE6F2] opacity-10 rounded-full blur-[120px] pointer-events-none"></div>
</body></html>
