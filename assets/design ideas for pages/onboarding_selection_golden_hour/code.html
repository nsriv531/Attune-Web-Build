<body class="min-h-screen font-body-md flex flex-col items-center overflow-x-hidden">
<!-- Top AppBar (Internal Transactional - Suppressed Nav Items) -->
<header class="flex justify-between items-center px-margin py-4 w-full fixed top-0 z-50">
<div class="flex items-center gap-2">
<span class="text-2xl font-extrabold text-stone-800 tracking-tighter">Attune</span>
</div>
<button class="text-stone-400 font-label-md hover:text-stone-800 transition-colors">Skip</button>
</header>
<main class="w-full max-w-2xl px-margin pt-xl pb-32 flex flex-col items-center">
<!-- Meditative Mascot Section -->
<div class="mb-md flex flex-col items-center">
<div class="relative w-32 h-32 mb-sm flex items-center justify-center">
<div class="absolute inset-0 bg-primary-fixed/30 rounded-full blur-2xl animate-pulse"></div>

</div>
<h1 class="font-headline-md text-on-surface text-center px-4">What would you like help with?</h1>
<p class="font-body-md text-stone-500 text-center mt-2 px-8">Let's tailor your focus environment to your unique rhythm.</p>
</div>
<!-- Section: Persona Selection -->
<div class="w-full mt-lg">
<h2 class="font-label-md text-stone-400 mb-md tracking-widest uppercase text-center">I'm primarily a...</h2>
<div class="grid grid-cols-2 md:grid-cols-4 gap-gutter">
<!-- Option: Student -->
<button class="pebble-chip flex flex-col items-center justify-center p-md rounded-[32px] bg-white border border-stone-100 golden-glow hover:bg-primary-fixed/20 group">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center mb-sm group-hover:bg-primary-container/30">
<span class="material-symbols-outlined text-primary" data-icon="school">school</span>
</div>
<span class="font-label-md text-on-surface">Student</span>
</button>
<!-- Option: Professional -->
<button class="pebble-chip flex flex-col items-center justify-center p-md rounded-[32px] bg-primary-container text-on-primary-container shadow-xl scale-105 border-2 border-primary-container">
<div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center mb-sm">
<span class="material-symbols-outlined" data-icon="work" data-weight="fill">work</span>
</div>
<span class="font-label-md">Professional</span>
</button>
<!-- Option: Creator -->
<button class="pebble-chip flex flex-col items-center justify-center p-md rounded-[32px] bg-white border border-stone-100 golden-glow hover:bg-primary-fixed/20 group">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center mb-sm group-hover:bg-primary-container/30">
<span class="material-symbols-outlined text-primary" data-icon="palette">palette</span>
</div>
<span class="font-label-md text-on-surface">Creator</span>
</button>
<!-- Option: Caregiver -->
<button class="pebble-chip flex flex-col items-center justify-center p-md rounded-[32px] bg-white border border-stone-100 golden-glow hover:bg-primary-fixed/20 group">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center mb-sm group-hover:bg-primary-container/30">
<span class="material-symbols-outlined text-primary" data-icon="volunteer_activism">volunteer_activism</span>
</div>
<span class="font-label-md text-on-surface">Caregiver</span>
</button>
</div>
</div>
<!-- Section: Goal Selection -->
<div class="w-full mt-xl">
<h2 class="font-label-md text-stone-400 mb-md tracking-widest uppercase text-center">Main goal</h2>

<!-- Pebble Chips -->
<button class="pebble-chip px-6 py-3 rounded-full bg-white border border-stone-100 golden-glow font-label-md text-on-surface hover:bg-primary-fixed/20">Study</button>
<button class="pebble-chip px-6 py-3 rounded-full bg-primary-container/10 border-2 border-primary-container font-label-md text-on-primary-container">Focus</button>
<button class="pebble-chip px-6 py-3 rounded-full bg-white border border-stone-100 golden-glow font-label-md text-on-surface hover:bg-primary-fixed/20">Writing</button>
<button class="pebble-chip px-6 py-3 rounded-full bg-white border border-stone-100 golden-glow font-label-md text-on-surface hover:bg-primary-fixed/20">Exam prep</button>
<button class="pebble-chip px-6 py-3 rounded-full bg-white border border-stone-100 golden-glow font-label-md text-on-surface hover:bg-primary-fixed/20">Presentations</button>
<button class="pebble-chip px-6 py-3 rounded-full bg-white border border-stone-100 golden-glow font-label-md text-on-surface hover:bg-primary-fixed/20">Build habits</button>
<button class="pebble-chip px-6 py-3 rounded-full bg-white border border-stone-100 golden-glow font-label-md text-on-surface hover:bg-primary-fixed/20">Reduce distractions</button>
</div>
</div>
<!-- Progress and CTA -->
<div class="fixed bottom-0 left-0 w-full p-margin bg-gradient-to-t from-[#FFFBF5] via-[#FFFBF5]/90 to-transparent flex flex-col items-center">
<div class="w-full max-w-md flex flex-col items-center">
<!-- Progress bar -->
<div class="w-32 h-1 bg-stone-200 rounded-full mb-md overflow-hidden">
<div class="w-1/2 h-full bg-primary-container"></div>
</div>
<button class="w-full max-w-sm py-4 bg-primary text-on-primary font-label-md rounded-full shadow-lg hover:shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    Continue
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-label-sm text-stone-400 mt-sm">Step 2 of 4</p>
</div>
</div>
